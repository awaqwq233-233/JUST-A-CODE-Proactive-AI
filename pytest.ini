[pytest]
# Phase 0 baseline config. No --cov-fail-under yet (added in Phase 6 once
# coverage targets are met, to avoid failing the suite during early phases).
testpaths = tests
# Put `src/` on sys.path so tests can `import memory` / `from memory.store import ...`
# (the memory package will live at src/memory/, added by Archi in Phase 1).
pythonpath = src
addopts = -q --cov=src --cov-report=term-missing
# Hard cap on every test so a hung LLM/IO call can't freeze the suite.
timeout = 30
